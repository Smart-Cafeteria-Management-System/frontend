# ============================================================
# Smart Cafeteria Frontend — CI/CD Pipeline
# Triggers on push and pull requests to main branch
# Steps: Checkout → Setup Node → Install → Lint → Test → Build
# ============================================================

name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run ESLint
      - name: Lint
        run: npm run lint

      # 5. Run Tests
      - name: Test
        run: npm test

      # 6. Build for production
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smart-cafeteria-frontend .
